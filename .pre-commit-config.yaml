# See https://pre-commit.com for usage:
#   pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with the ruff version pinned in pyproject.toml ([dev] extra).
    rev: v0.15.14
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        # Type-check only the package; tests are not under strict typing.
        files: ^httpmocker/
        # mypy needs the typed runtime deps available to resolve their stubs
        # and to load the pydantic mypy plugin.
        additional_dependencies:
          - pydantic>=2.11
          - rich>=14.0
